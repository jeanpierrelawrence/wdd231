<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive, motion-driven educational platform designed to demystify human biology and complex physiological systems through character-driven hormone profiles.">
    <meta name="author" content="Jp Lawrence">
    <meta property="og:title" content="Bodinode — Interactive Biology Engine"/>
    <meta property="og:description" content="Explore the secret world of hormones! Meet the characters regulating your metabolism, sleep, and development through dynamic, micro-learning biology profiles." />
    <meta property="og:url" content="https://jeanpierrelawrence.github.io/wdd231/finalproject/body-simulator.html" />
    <meta property="og:image" content="https://jeanpierrelawrence.github.io/wdd231/finalproject/images/og-image.avif" />
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/avif">
    <title>Body Simulator — Bodinode</title>

    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <img src="images/bodinode-logo.svg" alt="Bodinode">
        <button id="menu-button" class="menu-button" aria-label="Open Menu">
            <span class="menu-bar"></span>
            <span class="menu-bar"></span>
        </button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="body-simulator.html">Body Simulator</a></li>
                <li><a href="lab-history.html">Lab History</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="form-grid">
            <div class="left">
                <h1>Body Simulator</h1>
                <p>Your body changes its settings depending on what you do. Choose a scenario below to see how your body shifts gears!</p>
                <figure>
                    <img src="./images/characters/ghrelin.avif" alt="Plush 3D Ghrelin character" width="800">
                </figure>
            </div>
            <form action="simulation-results.html" method="GET" class="simulator-form">
                <h2>Select a body scenario</h2>

                <div class="scenarios-grid">
                    <label class="scenario-option">
                        <input type="radio" name="scenario" value="running" checked>
                        <span class="custom-radio"></span>
                        <div class="option-content">
                            <h3>Going for a run</h3>
                            <p>See how your body speeds up your heart, opens your lungs, and unlocks fast energy.</p>
                        </div>
                    </label>

                    <label class="scenario-option">
                        <input type="radio" name="scenario" value="stress">
                        <span class="custom-radio"></span>
                        <div class="option-content">
                            <h3>Spooked or Stressed</h3>
                            <p>See how a sudden scare triggers high alert, sharpens your focus, and pauses digestion.</p>
                        </div>
                    </label>

                    <label class="scenario-option">
                        <input type="radio" name="scenario" value="fasting">
                        <span class="custom-radio"></span>
                        <div class="option-content">
                            <h3>Skipping a Meal</h3>
                            <p>See how your stomach rings its dinner bell and switches your system over to backup fuel tanks.</p>
                        </div>
                    </label>

                    <label class="scenario-option">
                        <input type="radio" name="scenario" value="sleeping">
                        <span class="custom-radio"></span>
                        <div class="option-content">
                            <h3>Deep, Peaceful Sleep</h3>
                            <p>See how your body turns into a busy nighttime repair shop to fix muscles and grow bones.</p>
                        </div>
                    </label>
                </div>

                <button type="submit">
                    Continue <img src="./images/arrow.svg" alt="Arrow">
                </button>
            </form>
        </section>
    </main>
    <footer></footer>
    <script src="scripts/main.mjs" type="module"></script>
</body>
</html>
